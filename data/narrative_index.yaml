# The curated narrative index: one record per generation/arc, authored 2026-07-11 from
# reading the ledgers (MISSION_CONTROL_BRIEF §3). RULES:
#  - every string under `quote:` is VERBATIM from the file named in `ledger:` (modulo the
#    ledgers' hard line-wrapping; the provenance test collapses whitespace before matching);
#  - `label:` and `question:` are curated paraphrase and carry no numbers that are not in a quote;
#  - era: campaign (congestion game) | pre-fix | post-fix (the 2026-07-09 node-ordering fix).
# Chapters (the three pivots as dividers): campaign -> interdiction -> multiconvoy -> expansion.

chapters:
  - id: campaign
    title: "The congestion campaign"
    subtitle: "Acts I-III: the rigorous negative (Jun to 6 Jul 2026)"
  - id: interdiction
    title: "The interdiction redesign"
    subtitle: "Act IV: the security game where adversarial RL provably works (6-7 Jul 2026)"
  - id: multiconvoy
    title: "The multi-convoy game"
    subtitle: "Fleets, mission failure, and the audit that moved the headline (7-10 Jul 2026)"
  - id: expansion
    title: "The expansion programme"
    subtitle: "Zero-shot transfer, the SBO stack, pattern-of-life dynamism (10-11 Jul 2026)"
  - id: defence
    title: "The claims-defence programme"
    subtitle: "Blocks A and B: controls, boundaries and differentiators (12-13 Jul 2026)"

era_divider:
  after: gen09
  title: "The node-ordering fix (2026-07-09, SHA e9acb56)"
  text: >-
    An examiner-grade audit found a project-wide representation bug: every network ever
    trained read a fixed permutation of the wrong nodes' embeddings. Everything before the
    fix is the PRE-FIX era (internally valid comparisons, scrambled spatial semantics);
    everything after is POST-FIX. The project never mixes the two in one visual, and
    neither does this app.
  source: sacred/experiments/gen10_postfix.md

generations:

  # ---------------------------------------------------------------- campaign

  - id: origins
    chapter: campaign
    era: campaign
    title: "OSM static baseline: the learnability wall"
    dates: "2026-06-14 to 06-18"
    status: DIVERGED_THEN_FLAT
    plain: >-
      The very first version trained without crashing but learned nothing useful: whatever it did, about 91% of parcels arrived anyway, so its choices barely mattered.
    question: >-
      Can the original SACRED formulation (Kaliningrad OSM graph, 4 trucks, 150 packages,
      co-evolving congestion adversary) learn end to end?
    ledger: SACRED_PROGRESS.md
    quotes:
      - label: "First run diverged"
        quote: "first 2000-ep run **diverged** (SAC temperature α 1→69, critic Q 7→601 - root cause: inverted alpha-loss sign, later fixed)"
      - label: "Stable but flat after the fix"
        quote: "two reward-variant runs were *stable but flat*: delivery rate pinned at **~0.91** across every variant; the critic's `Q_Spread` diagnostic **collapsed 5.3→0.46**; policy entropy never fell"
    lesson: >-
      Stable training and learnable problem are different properties. With demand everywhere,
      per-step decisions are near-inconsequential and the adversary is toothless.
    demo: text
    tb_runs: ["sacred_atla_thesis_run_2000ep_sw50_b32_0614_170342", "protag_signal_rebalance_2000ep_sw50_b32_0617_135022", "protag_reward_shaping_2000ep_sw50_b32_0618_150523"]
    figures: ["assets/kaliningrad_filter_compare.png", "assets/kaliningrad_demand_heatmap.png"]

  - id: stage0
    chapter: campaign
    era: campaign
    title: "Stage 0: single-truck next-hop route choice"
    dates: "2026-06-27/28"
    status: NEAR_WASH
    plain: >-
      On the simplest possible test track the AI did learn, but it could only ever match the off-the-shelf dispatcher, never beat it.
    question: >-
      Can the SACRED stack learn a consequential adversarial policy at all, on the cleanest
      possible signal (one truck, two-route corridor)?
    ledger: SACRED_PROGRESS.md
    quotes:
      - label: "It learns, but"
        quote: "it learns: `Q_Spread` 0.85→1.58, entropy 0.60→0.34 (commits), antagonist co-evolves (Q 22→62), 12/12 delivered: but **matches reactive greedy under attack** (final gap +24, ~1.6%) and never beats it"
    lesson: >-
      The first of three near-washes against reactive greedy; reactive baselines are strong
      (Ritzinger et al. 2015).
    demo: text
    tb_runs: ["stage0_mature_1000ep_sw50_b32_0628_113727"]

  - id: static3b
    chapter: campaign
    era: campaign
    title: "Static-3b assignment probe and the retraction"
    dates: "2026-06-28, retracted 06-29"
    status: RETRACTED
    plain: >-
      An early 'first win' was celebrated, re-checked, and taken back: measured properly, it was a loss. The re-check became the project's rulebook.
    question: >-
      Does RL beat greedy insertion at multi-truck assignment, where greedy is provably
      suboptimal?
    ledger: SACRED_PROGRESS.md
    quotes:
      - label: "The retraction"
        quote: "**RETRACTED on a windowed re-read**: mean `gap_atk` over all 20 eval points **+18** (a loss), reliable static loss ~+8%, and the metric itself was mis-specified"
    lesson: >-
      The project's most important methodological lesson: never headline a final/best point;
      fix the decision metric in advance. The retraction seeded the ledger discipline every
      later claim rests on.
    demo: text

  - id: gen01
    chapter: campaign
    era: campaign
    title: "gen01: ERB bootstrapping pilot"
    dates: "2026-06-28/29"
    status: INCONCLUSIVE
    plain: >-
      Giving the AI worked examples to copy from did not help it learn, and late in training its sparring partner spiralled and wrecked the run.
    question: >-
      Does seeding the replay buffer with greedy demonstrations (Obj-3's ERB bootstrapping)
      fix the static assignment gap and accelerate learning?
    ledger: experiments/gen01_erb_ablation.md
    quotes:
      - label: "ERB did not move the gap"
        quote: "`gap_noatk` stayed **~+50** (start +54)"
      - label: "Late co-evolution instability"
        quote: "`Q_Spread` 7.1→1.9, entropy 0.5→0.7, antagonist Q 19→56"
    demo: chart
    tb_runs: ["gen01_erb_ablation/assign_erb_seed0"]

  - id: gen02
    chapter: campaign
    era: campaign
    title: "gen02: dynamic (Poisson) assignment"
    dates: "2026-06-29/30"
    status: NEAR_WASH
    plain: >-
      In a more realistic setting with random orders arriving, the AI again roughly tied the classical dispatcher; the differences were noise.
    question: >-
      Does RL beat greedy insertion under attack in the dynamic regime, beyond seed luck?
    ledger: experiments/gen02_dynassign.md
    quotes:
      - label: "Not significant"
        quote: "**cross-seed mean gap_atk ≈ −106**, but **±~1000 std (SEM ±450) → NOT significant**"
      - label: "Reliable static loss"
        quote: "`gap_noatk` ≈ **+348 (~+6%)**, low-variance → RL **reliably loses statically**"
    demo: chart
    tb_runs: ["gen02_dynassign/dynassign_seed0", "gen02_dynassign/dynassign_seed1"]
    figures: ["scratch/dynassign_demo.gif", "scratch/dynassign_geometry.png"]

  - id: critique
    chapter: campaign
    era: campaign
    title: "The critique and the reframe"
    dates: "2026-07-01/02"
    status: REFRAMED
    plain: >-
      A fresh pair of eyes found a bug that fired every single round, and noticed the one comparison the project had promised to run had never been run.
    question: >-
      Fresh-eyes interrogation after three near-washes: was the evidence valid, and was
      "beat greedy" ever the objective?
    ledger: SACRED_PROGRESS.md
    quotes:
      - label: "A real bug found"
        quote: "the hybrid rung had a **mechanical bug firing every episode**: cross-event double assignment stranded a truck orbiting a served node"
      - label: "The missing control"
        quote: "the thesis's own Obj-5 control: a *non-adversarially trained* SAC: had never been run"
    lesson: >-
      The headline became robustness from adversarial training (SACRED vs vanilla SAC under
      held-out attacks); every subsequent experiment is pre-registered.
    demo: text

  - id: gen03
    chapter: campaign
    era: campaign
    title: "gen03: the robustness pilot; the adversary cannot attack"
    dates: "2026-07-02/03"
    status: "NULL"
    plain: >-
      First proper test of the big idea, and it failed: not because the defender could not learn, but because the learned ATTACKER was weaker than random vandalism.
    question: >-
      Does ATLA co-evolution buy robustness to held-out attacks versus an identical
      vanilla-SAC control?
    ledger: experiments/gen03_robustness_dynassign.md
    quotes:
      - label: "Primary null, wrong sign"
        quote: "`dD = D(vanilla, br_own) − D(sacred, br_own)`: pair0 **−291 ± 500**, pair1 **−255 ± 295** (95% CI, n=30 paired instances each)"
      - label: "The diagnostic that matters"
        quote: "The learned attackers are **weaker than random blocking** and **3–6× weaker than the scripted heuristic**"
    lesson: >-
      The binding constraint on the whole framework is adversary competence, not protagonist
      learning.
    demo: chart
    tb_runs: ["gen03_robustness_dynassign/vanilla_seed0"]

  - id: gen04
    chapter: campaign
    era: campaign
    title: "gen04: can the adversary see now? Gate FAIL"
    dates: "2026-07-04"
    status: GATE_FAIL
    plain: >-
      Even after giving the attacker full sight of the trucks, it still could not beat random blocking. The problem was in its learning, not its eyes.
    question: >-
      With full motion observability, does a retrained best-response attacker finally beat
      random blocking?
    ledger: experiments/gen04_antag_gate.md
    quotes:
      - label: "Still below random"
        quote: "Ratios: br/random = **0.84** (PASS needed ≥ 1.25); br/targeted = 0.28 (STRONG needed ≥ 0.50)"
      - label: "Entropy pinning diagnosed"
        quote: "**α stayed pinned at 1.0 with policy entropy ~2.1**"
    demo: chart
    tb_runs: ["gen04_antag_gate/br_fixed_vanilla_s0_seed0"]

  - id: gen05
    chapter: campaign
    era: campaign
    title: "gen05: the hybrid matrix is competence-void"
    dates: "2026-07-04"
    status: NOT_MET
    plain: >-
      On the hardest arena neither side learned the job at all, which makes any robustness comparison meaningless. Weak players can fake toughness.
    question: >-
      Does adversarial training against the strong scripted attacker buy robustness to a
      held-out attack on the decision-dense hybrid arena?
    ledger: experiments/gen05_hybrid_matrix.md
    quotes:
      - label: "Sign reversed"
        quote: "pooled `dD_gateway = −192 ± 181` (95% CI, n=72), pairings positive **0/3**"
      - label: "Neither arm learned"
        quote: "W(none) ≈ 4.6–4.8k vs greedy's 847 — ~5.6× worse"
      - label: "The one nugget"
        quote: "**Against GREEDY, the learned attackers finally work**: +1667"
    lesson: >-
      Weak policies fake robustness (ceiling compression); competence is a precondition for
      the robustness question. The +1667 nugget seeds Act III: predictability is the
      exploitable surface.
    demo: chart
    tb_runs: ["gen05_hybrid_matrix/hybrid_vanilla_seed0"]
    figures: ["scratch/hybrid_geometry.png"]

  - id: gen06
    chapter: campaign
    era: campaign
    title: "gen06: the definitive negative"
    dates: "2026-07-05"
    status: REVERSED
    plain: >-
      The definitive negative: with everything finally fair and working, training against attacks made the AI WORSE under attack, and the humble classical dispatcher was the most robust of all.
    question: >-
      In the competence-gated arena, does adversarial training buy robustness to the fully
      held-out targeted attack?
    ledger: experiments/gen06_dynassign_matrix.md
    quotes:
      - label: "Competence gate passed"
        quote: "**Competence gate: PASS, all six arms** — W(none) within **+5.5…+7.0%** of greedy (6538–6635 vs 6200)"
      - label: "Primary significantly reversed"
        quote: "pooled `dD_targeted = −881 ± 284` (95% CI, n=90), pairings positive **0/3** (−1379±519 / −785±510 / −479±400) → **NOT MET, significantly reversed**"
      - label: "Worse even under its own attacker"
        quote: "`dD_pathrand = −775 ± 244` (0/3) — the scripted arm is worse even under **its own training attacker**"
      - label: "The robustness ranking"
        quote: "greedy (4921) > vanilla (5196–5882) > adversarially-trained (6361–6575)"
    lesson: >-
      Adversarial co-training, as formulated for the stochastic-dynamic VRP, does not confer
      robustness and measurably worsens it. The most robust policy measured is the reactive
      classical dispatcher.
    demo: chart
    tb_runs: ["gen06_dynassign_matrix/vanilla_seed0", "gen06_dynassign_matrix/dynassign_scripted_seed0"]

  - id: gen07
    chapter: campaign
    era: campaign
    title: "gen07: the flat landscape, and the pivot"
    dates: "2026-07-06"
    status: CLOSED_PIVOT
    plain: >-
      The diagnosis: traffic jams are the wrong kind of enemy. Every road-block hurts about the same, so there is no pattern for an attacker to learn, and no pressure for a defender to answer.
    question: >-
      Can the exploitability reframe (worst case against a strategic attacker) be made to
      work with the congestion adversary, given five learnability fixes?
    ledger: experiments/gen07_contested_matrix.md
    quotes:
      - label: "The corrected gate fails robustly"
        quote: "the CORRECTED BR gate (all five fixes applied, §B9.iv below) showed a best-response attacker plateaus at **0.35× random** with entropy pinned and near-zero Q-spread"
      - label: "Why: every block is equally damaging"
        quote: "br/random = **0.35** (WORSE than the unfixed hybrid gate's 0.84)"
    lesson: >-
      The attack landscape is flat where it is large and thin where it is differentiated: a
      structural property of the congestion adversary (observable, reroutable, reversible),
      not a fixable optimisation issue. The constructive move: change the adversary to
      interdiction (hidden, irreversible, pre-committed), a Stackelberg security game.
    demo: text
    figures: ["scratch/chokepoints.png"]

  # ---------------------------------------------------------------- interdiction

  - id: gen08
    chapter: interdiction
    era: pre-fix
    title: "gen08: the security game works; B2-P3 banks the first PASS"
    dates: "2026-07-06/07"
    status: PASS
    plain: >-
      The turnaround. Against hidden ambushes, taking the same route every time means being caught every time, and mixing routes the mathematically right way cuts losses dramatically. The AI learned that mix on a real city map.
    question: >-
      Does a SAC dispatcher trained adversarially learn a mixed-strategy route policy less
      exploitable than shortest-path AND than non-adversarial SAC, approaching the computable
      minimax equilibrium?
    ledger: experiments/gen08_interdiction.md
    quotes:
      - label: "The equilibrium proof (before any training)"
        quote: "deterministic routing 100% intercepted → minimax mixed 17-33% on the real Kaliningrad graph"
      - label: "The first positive result (I2 slice)"
        quote: "**Adversarial training cut interception 100% -> 23%**, converging toward the computed equilibrium"
      - label: "The banked B2-P3 ladder (TAP, pooled)"
        quote: "shortest_path 1.000 > vanilla 0.477 > uniform 0.455 > **sacred 0.362** >> equilibrium 0.167"
      - label: "Vanilla is worse than noise on shared edges"
        quote: "on shared-edge instances, cost-driven mixing is WORSE than naive noise: predictability with extra steps"
      - label: "Strong form honestly missed"
        quote: "**STRONG form NOT met (reported plainly):** distance-to-equilibrium 0.163-0.239"
    lesson: >-
      Three fictitious-play disciplines were bracketed on the way: latest-pure-BR cycles,
      all-history mixtures park, SMOOTH fictitious play converges. Instance structure decides
      whether the control can imitate the equilibrium.
    demo: chart
    runs_dir: gen08_interdiction_I3
    sha: "874d3f3"

  # ---------------------------------------------------------------- multiconvoy

  - id: gen09
    chapter: multiconvoy
    era: pre-fix
    title: "gen09: the multi-convoy headline, locked at the best checkpoint"
    dates: "2026-07-08/09"
    status: LOCKED
    plain: >-
      Three convoys, one ambusher: the AI's randomised convoy plan lost far fewer missions than ALNS, the best classical route planner, close to the theoretical best possible.
    question: >-
      Does adversarially-trained randomised fleet routing beat a coordinating classical
      metaheuristic (ALNS) and non-adversarial SAC under the loss-averse mission-failure
      objective?
    ledger: experiments/gen09_multiconvoy.md
    quotes:
      - label: "The locked headline"
        quote: "**SACRED best-checkpoint TAP mean 0.283 +/- 0.021 (3 seeds).**"
      - label: "The fairness row"
        quote: "ALNS is FREE to stack but SPREADS by choice (spread 0.699 < forced-stack 0.912), so SACRED's advantage is the RANDOMISATION"
      - label: "The transient finding (three failed holds)"
        quote: "the adversarial mechanism reproducibly PRODUCES the equilibrium hedge (validated, tight across seeds)"
      - label: "The structural screen"
        quote: "DISJOINT route sets are ALWAYS near-uniform-leader (H/lnR >= 0.97) -> a flat fictitious-play landscape"
      - label: "The honest caveat"
        quote: "the fleet stacking is STRUCTURAL (followers copy the leader), the honest caveat carried from the start"
    demo: chart
    runs_dir: gen09_multiconvoy
    sha: "ad70a9c"

  - id: gen10
    chapter: multiconvoy
    era: post-fix
    title: "gen10: the audit, the fix, and the re-runs"
    dates: "2026-07-09"
    status: SPLIT
    plain: >-
      An audit found a serious wiring bug affecting every network ever trained. After the fix the single-convoy result got clearly better; the fleet result got worse and was honestly re-measured.
    question: >-
      Do the two banked headlines survive, and by how much do they improve, when the policy
      heads read the correct node embeddings?
    ledger: experiments/gen10_postfix.md
    quotes:
      - label: "The bug"
        quote: "every network ever trained in this project read a fixed permutation of the wrong nodes' embeddings (demonstrated: convoy at node 62 reads node 167's row)"
      - label: "Single-convoy: markedly better"
        quote: "pooled sacred TAP 0.276 vs the banked 0.362 (distance-to-equilibrium 0.109 vs 0.195, i.e. ~44% of the residual gap was the representation bug)"
      - label: "Multi-convoy: regressed, reported as measured"
        quote: "**Post-fix EXACT best-checkpoint TAP mean 0.447 +/- 0.029** vs the pre-fix exact comparator **0.295 +/- 0.024**"
      - label: "MC2 attribution"
        quote: "**gen10-MC2 EXACT best-checkpoint TAP mean 0.447 +/- 0.008**: numerically identical to gen10-MC's 0.447 +/- 0.029"
      - label: "The fleet-cost column"
        quote: "its premium is essentially THE EQUILIBRIUM'S OWN (123.1 vs 120.8): the randomised stack pays what optimal play pays"
    lesson: >-
      A bug can flatter learning: the pre-fix permutation was an accidental route-identity
      hash. The single-convoy headline is superseded to 0.276; the multi-convoy plateau at
      0.447 pointed at head discriminability, resolved by gen12/gen13's instance finding.
    demo: chart
    runs_dir: gen10_postfix
    sha: "e9acb56"

  - id: gen11
    chapter: multiconvoy
    era: post-fix
    title: "gen11: the menu-head decomposition"
    dates: "2026-07-10 (overnight)"
    status: NO_PASS
    plain: >-
      Attempts to repair the fleet result with new network parts all failed, but the failures explained exactly why the old buggy version had accidentally looked better.
    question: >-
      Can the post-fix multi-convoy leader reach the pre-fix headline on honest
      representations, via head features or a leader-only push?
    ledger: experiments/gen11_menuhead.md
    quotes:
      - label: "The plateau stands"
        quote: "| B (cost+vuln features) | 0.410 / 0.441 / 0.479 | **0.443 +/- 0.028** | 0.708 | = plateau; `route_feat_w` ended at [0.001, 0.005]: NEVER TRAINED to relevance |"
      - label: "Identity vs semantics (gen11b)"
        quote: "| E' (identity, lr 3e-2) | **0.295 / 0.295** / 0.482 | 0.357 +/- 0.088 | bias spread [-1.38, 3.57], std 1.36 |"
      - label: "Falsified spectacularly"
        quote: "| C (leader-only push) | 0.980 / 0.980 / 0.980 | 0.980 +/- 0.000 | 0.980 | CATASTROPHIC: H_lead 0.00 from eval 1, alpha -> 295 |"
    lesson: >-
      Added head parameters need their own learning-rate scale or they are silent no-ops;
      memorisable identity beats transferable semantics where the equilibrium is flat.
    demo: chart
    runs_dir: gen11_menuhead

  - id: f3
    chapter: multiconvoy
    era: post-fix
    title: "F3: the Obj-4 SBO demonstrator"
    dates: "2026-07-10 (overnight)"
    status: MET
    plain: >-
      A small neural stand-in learned to predict how safe a base location would be, well enough to pick the best site without solving the game each time.
    question: >-
      Can a neural metamodel approximate the interdiction-aware quality of a base/FOB
      placement + fleet-size design well enough to select good designs without solving the
      game?
    ledger: experiments/f3_sbo_demonstrator.md
    quotes:
      - label: "Held-out surrogate quality"
        quote: "**Held-out: RMSE 0.0222 (target range 0.099-0.332) | Spearman rho 0.894 (p = 7e-40) | argmin regret 0.0000**"
      - label: "The space"
        quote: "x fleet size N in {2,3,4} = **450 designs**"
    demo: live
    artefact: models/runs/sbo_placement_demo.json

  - id: gen12
    chapter: multiconvoy
    era: post-fix
    title: "gen12: the disruption sweep curves and the held-out OD"
    dates: "2026-07-10 (overnight)"
    status: CURVES_BANKED
    plain: >-
      The AI stayed ahead of ALNS in every one of ten harder-and-harder settings: more ambush teams, bigger fleets, and a brand-new crossing.
    question: >-
      Does SACRED's best-checkpoint stay below ALNS across K and N on the headline OD and a
      held-out OD screened before training?
    ledger: experiments/gen12_sweeps.md
    quotes:
      - label: "The tier verdict"
        quote: "SACRED < ALNS in ALL 10 CELLS; the held-out OD reaches near-equilibrium POST-FIX"
      - label: "The held-out headline cell"
        quote: "| N=3 K=1 | **0.261** | 0.699 | 0.206 | **1.27x** |"
      - label: "The key finding"
        quote: "the 0.447 plateau is INSTANCE-SPECIFIC to 62-97, not architectural"
      - label: "The post-fix vanilla row"
        quote: "**post-fix vanilla completed to 3 seeds** (TAP 0.859 / 0.852 / 0.855 = **0.855 +/- 0.003**"
    demo: chart
    runs_dir: gen12_sweeps

  - id: zst0
    chapter: multiconvoy
    era: post-fix
    title: "ZST step 0: the pre-registered scoping negative"
    dates: "2026-07-10 (overnight)"
    status: NO_TRANSFER
    plain: >-
      Dropped onto a crossing it had never seen, the old single-map AI did worse than an untrained one. Real transfer was going to need training across many maps.
    question: >-
      Does the single-OD post-fix policy transfer zero-shot to a held-out OD's security game?
    ledger: experiments/zst_step0.md
    quotes:
      - label: "Fails the random-init clause"
        quote: "is WORSE than an untrained network (0.699 > 0.584): the training specialised the walk policy to the home OD's branch geometry"
      - label: "The mechanism read"
        quote: "with hard interception there is NO observable threat/geometry signal for the policy to condition on, so zero-shot generalisation had no mechanism to work through"
    lesson: >-
      The boundary gen15 then removed. (Read then as "give the policy the map"; the A2/A3
      probes later reattributed the mechanism: what ZST-0 actually lacked was
      multi-instance training and transferable route features, not the map observation
      per se.)
    demo: chart
    artefact: models/runs/zst_step0.json

  - id: gen13
    chapter: multiconvoy
    era: post-fix
    title: "gen13: the lock; the multi-convoy headline goes post-fix"
    dates: "2026-07-10"
    status: LOCK_PASSED
    plain: >-
      On a new proving ground chosen by rules written in advance, the fleet result was re-established cleanly after the bug fix, across three fresh training runs.
    question: >-
      Does the held-out-screened instance 35-159 hold near-equilibrium across seeds, making
      the multi-convoy headline fully post-fix?
    ledger: experiments/gen13_lock.md
    quotes:
      - label: "The lock"
        quote: "**gen13-lock exact best-checkpoint TAP mean 0.274 +/- 0.025 (3 seeds).**"
      - label: "What is established"
        quote: "the adversarially-trained fleet's randomised stack is 2.55x less mission-exploitable than the certified deterministic optimum and lands at 1.33x the computable equilibrium"
      - label: "The asymmetry retired"
        quote: "BOTH headlines (single-convoy gen10-SC 0.276; multi-convoy gen13 0.274) now sit on corrected code"
    demo: live
    runs_dir: gen13_lock
    instance: "35-159 k8 band(0.15,0.95) N=3 K=1"

  - id: gen14
    chapter: multiconvoy
    era: post-fix
    title: "gen14: n=10 confidence intervals for both headlines"
    dates: "2026-07-10"
    status: CLOSED
    plain: >-
      The headline numbers were re-run ten times over to attach proper statistical error bars. They held.
    question: >-
      Make both headlines n=10 with t-based 95% CIs and complete the 35-159 ladder natively.
    ledger: experiments/gen14_evidence.md
    quotes:
