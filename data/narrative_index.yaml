  - id: gen23
    chapter: expansion
    era: post-fix
    title: "gen23: ERB from a metaheuristic hurts (Obj-3 closed with a mechanism)"
    dates: "2026-07-11"
    status: NEGATIVE
    plain: >-
      Copying a champion planner's answers into the AI's memory backfired: those answers are predictable by design, which is exactly what this game punishes.
    question: >-
      Does seeding the replay buffer with ALNS-population demonstrations accelerate the
      fleet-route defender's convergence on the interdiction headline (Obj-3 verbatim)?
    ledger: experiments/gen23_c1_erb.md
    quotes:
      - label: "The result"
        quote: "**The seeding HURTS: cold reaches competence in ~100-500 sorties and lands at 0.285 (near the headline 0.256); seeded NEVER reaches the 0.35 bar and plateaus at 0.443.**"
      - label: "The verbatim closure"
        quote: "ERB bootstrapping via a population-based metaheuristic does NOT accelerate convergence on the interdiction headline - it DEGRADES it"
      - label: "The mechanism"
        quote: "seeding a MIXED-STRATEGY learner (whose optimum is randomise-your-stack) with deterministic expert demonstrations biases it toward exploitable determinism, away from the equilibrium randomisation"
      - label: "The contrast that proves the rule"
        quote: "demonstration bootstrapping helps only when the demonstrated behaviour matches the target solution concept"
    lesson: >-
