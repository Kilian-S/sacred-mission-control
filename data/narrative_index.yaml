  - id: a2a3
    chapter: defence
    era: post-fix
    title: "A2 + A3: does the generalist read the map, and does it survive intel error?"
    dates: "2026-07-12"
    status: REATTRIBUTES
    plain: >-
      Scrambling the danger map the AI sees barely changes its behaviour. That is good news (wrong intelligence barely hurts) and honest news (it navigates by the city's shape, not by reading the map).
    question: >-
      Is the zero-shot claim an artefact of the length-derived threat-map family, and does
      the hedge survive corrupted threat intelligence?
    ledger: experiments/zst_map_robustness.md
    quotes:
      - label: "Shuffled reality: the bar passed"
        quote: "on 18 shuffled-reality cells the frozen generalist scores 1.80x those games' own equilibria vs random-init 2.19x, beating each game's deterministic optimum on 13/18"
      - label: "Intel error: essentially total robustness"
        quote: "fully shuffling the OBSERVED map while reality stays fixed costs +0.03 (1.71 -> 1.74); the strongest multiplicative noise costs +0.07"
      - label: "But map-reading is NOT the mechanism"
        quote: "an information-free observed map costs only +0.09 (1.71 -> 1.80, still far below random 1.99)"
      - label: "The binding wording rule"
        quote: "the generalist learns a geometry-informed, threat-robust calibrated hedge"
    lesson: >-
      Three findings in one probe: the transfer edge survives threat fields decorrelated
      from geometry; the deployment does not depend on accurate threat intelligence; and
      per-edge map-reading is not the mechanism. Every "conditions on the threat map"
      sentence is retired, which also strengthens the ZST-vs-LP framing: the exact solver
      needs the true instance model, the hedge keeps its edge with a wrong or absent map.
    demo: text
