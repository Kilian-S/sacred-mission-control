  - id: b3b4
    chapter: defence
    era: post-fix
    title: "B3 + B4: the risk-aversion law and the multi-OD correlation gap"
    dates: "2026-07-12"
    status: LAW
    plain: >-
      Measured across the whole family of loss rules: the headline rule is the one where a predictable planner has no escape. And convoys with different destinations still gain real safety from coordinating.
    question: >-
      Is the mission objective "the objective where we win", and is a multi-OD game
      (different destinations, shared corridors) worth building?
    ledger: experiments/b3_b4_oracle.md
    quotes:
      - label: "The three-regime law"
        quote: "the objective family has THREE regimes at K=1"
      - label: "The thesis sentence"
        quote: "the mission objective is not \"the objective where we win\": it is the unique member of the family in which the deterministic planner cannot escape by spreading"
      - label: "The measured law"
        quote: "The \"price of predictability\" curve is now measured, not asserted."
      - label: "B4: the multi-OD gap"
        quote: "**median correlation gap (v_indep - v_joint)/v_joint = 14.4%; >= 10% on 10/15 triples**"
    lesson: >-
      Intermediate thresholds (P of at least m lost, m >= 2) are DEGENERATE in favour of
      determinism while the fleet fits on disjoint routes: a spread plan zeroes the
      objective, so neither mixing nor calibration matters there; at N=5 the m=2 regime
      re-enters. And correlated joint routing beats independent mixing by a real margin on
      corridor-sharing triples, justifying the future multi-OD game.
    demo: chart
    figures: ["assets/b3_risk_spectrum.png"]
    artefact: models/runs/b3_risk_spectrum.json
