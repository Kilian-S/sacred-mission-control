  - id: a6a7a8
    chapter: defence
    era: post-fix
    title: "A6-A8: the retrieval baseline, the gap-closure ladder, the prevalence figure"
    dates: "2026-07-12"
    status: BOUNDS
    plain: >-
      Even a simple copy-the-nearest-answer trick matches the AI's transfer, so the honest claim shifts: SACRED's edge is needing no answer key at all. A new ruler shows protection fading with distance from home, and a survey of 160 crossings shows the problem is everywhere, not cherry-picked.
    question: >-
      Does a trivial retrieval amortiser match the generalist; what does the transfer
      ladder look like in calibration content rather than ratios; and how often does
      calibrated mixing matter across the population of instances?
    ledger: experiments/a6_a7_a8_completions.md
    quotes:
      - label: "A6: retrieval matches the trained generalist"
        quote: "Nearest-training-instance equilibrium retrieval (mapped by cost rank; no test-side solve; labels on the 18 train instances only) lands at **1.676 = the trained generalist's own level**."
      - label: "A7: the gap-closure decay"
        quote: "**0.90 (trained) -> 0.83 -> 0.54 (held-out OD) -> 0.45 (held-out city) -> 0.20 (Istanbul) -> 0.04 (Kyiv)**: an honest, clean, figure-worthy decay"
      - label: "A7: the far-end wording rule"
        quote: "the far-end claims are randomisation-level protection, not calibrated hedging"
      - label: "A8: prevalence"
        quote: "**69% of high-connectivity ODs have det/eq >= 2** (material calibration headroom); **93% have uniform-stack >= 1.5x eq** (naive randomisation clearly suboptimal almost everywhere)"
      - label: "A8: the cherry-picking answer"
        quote: "the headline instances were screened to be favourable (top decile), from a population in which material headroom is the norm (69% at >= 2x), so the phenomenon is prevalent and the screen bought margin, not existence"
