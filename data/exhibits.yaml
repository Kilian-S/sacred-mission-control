# Quote cards rendered inside the Objectives exhibits (same provenance bar:
# every quote verbatim in the cited ledger, enforced by tests/test_exhibits.py).
quote_cards:
  obj1:
    - title: "Can the enemy be an AI too?"
      plain: >-
        We replaced the mathematical enemy with a learned one. It reached about
        four-fifths of the perfect ambusher's strength, and SACRED, trained against it,
        still kept the mission-failure chance far below the professional planner's.
      ledger: experiments/gen20_f2_learned.md
      items:
        - label: "The pass"
          quote: "**Defender best-ckpt mean 0.330 +/- 0.018 (3 seeds); all <= 0.356 and < ALNS 0.699.** PRIMARY PASS 3/3."
        - label: "The learned antagonist's strength"
          quote: "**Learned antagonist strength 0.81x the oracle BR** (mean over seeds)."
        - label: "The campaign reversal"
          quote: "the learned adversary that could not learn to attack congestion CAN learn to interdict"
  obj3:
    - title: "Do expert examples help it learn?"
      plain: >-
        Showing the AI the professional planner's example plans made it WORSE: the
        examples teach predictable habits, and predictable habits are exactly what
        loses this game. A fresh start learned more, faster.
      ledger: experiments/gen23_c1_erb.md
      items:
        - label: "The result"
          quote: "**The seeding HURTS: cold reaches competence in ~100-500 sorties and lands at 0.285 (near the headline 0.256); seeded NEVER reaches the 0.35 bar and plateaus at 0.443.**"
        - label: "The mechanism"
          quote: "seeding a MIXED-STRATEGY learner (whose optimum is randomise-your-stack) with deterministic expert demonstrations biases it toward exploitable determinism, away from the equilibrium randomisation"
  obj4:
    - title: "Designing bases in a city nobody trained on — and the honest caveat"
      plain: >-
        The whole pipeline works in a never-seen city: the shortcut model still scores
        sites well and the search still finds the best base quickly. But the dramatic
        first number we reported there turned out to depend on which trained AI we
        asked, so we now show all three answers and say so plainly.
      ledger: experiments/d3_gdansk.md
      items:
        - label: "The surrogate on unseen ground"
          quote: "**Surrogate over the TRAINED generalist's exploitability, on the never-trained city: held-out Spearman 0.862.**"
        - label: "Policy-vs-oracle design targets, PER SEED (the A5-mandated presentation)"
          quote: "**0.109 (seed 0) / 0.443 (seed 1) / 0.433 (seed 2)**"
        - label: "The reliability disclosure"
          quote: "the headline 0.109 was substantially a SEED-0 artefact; the honest cross-seed statement is \"policy-vs-oracle design-target correlation 0.11-0.44 on the unseen city, vs 0.768 in-distribution\": still a real gap, no longer a dramatic near-zero"
        - label: "What it still argues, stated carefully"
          quote: "you must price THE policy you will deploy, not a class-average and not the equilibrium abstraction"
    - title: "Decide everything together, or one thing at a time?"
      plain: >-
        Deciding base, fleet and road reinforcement together never did worse than the
        classical one-decision-at-a-time approach, and for one of the two trained AIs
        the classical way left 19% of the achievable safety on the table.
      ledger: experiments/b1_integration_gap.md
      items:
        - label: "The honest finding"
          quote: "**The joint loop attained the TRUE optimum under both actors at budget 60; the classical tier-by-tier decomposition matched it under one actor and left 19.3% on the table under the other.**"
        - label: "The Obj-4 wording, binding"
          quote: "a single surrogate-guided loop over the joint strategic-tactical-operational space finds the optimum at the same budget where the classical decomposition is only sometimes adequate (and 19% worse when not)"
  zst:
    - title: "What the transfer really proves"
      plain: >-
        Where the maths answer key exists, a student AI that simply copies it travels
        just as well. SACRED's real distinction is that it needs no answer key and
        knows when to stop training on its own — and beyond a certain problem size,
        answer keys stop existing altogether.
      ledger: experiments/gen24_distill.md
      items:
        - label: "Where labels exist, distillation wins"
          quote: "**Where equilibrium labels exist (K=1, milliseconds per LP), supervised distillation with validation early stopping is the strongest transfer recipe measured (1.56x)**"
        - label: "What adversarial self-play uniquely offers"
          quote: "**Adversarial self-play reaches comparable transfer WITHOUT labels and WITHOUT any validation signal** (1.73 select-on-train, 1.76 val-stopped: the two agree because it does not overfit)"
        - label: "The regime past the wall"
          quote: "past the enumeration wall (K >= 4, A4's regime) labels do not exist and validation-by-oracle is unavailable, so self-play is the only trainer on the board"
    - title: "How it really works — and how it survives bad intelligence"
      plain: >-
        The AI is not reading the danger map road by road: its protection comes from
        understanding road geometry, learned across several cities. That is why feeding
        it a completely wrong danger map barely hurts it.
      ledger: experiments/zst_map_robustness.md
      items:
        - label: "The binding wording rule"
          quote: "the generalist learns a geometry-informed, threat-robust calibrated hedge: its zero-shot advantage persists on threat fields decorrelated from geometry (1.80x vs random 2.19x) and is insensitive to threat-map observation error (a fully wrong map costs +0.03), but per-edge map-reading is not the mechanism (an information-free map costs +0.09)"
        - label: "Why this strengthens ZST-vs-LP"
          quote: "an exact solver requires the true instance model at decision time; the trained hedge keeps its edge with a wrong or absent map"
    - title: "What actually causes the transfer"
      plain: >-
        Training on travel cost alone makes transfer WORSE than not training at all,
        and mere exposure to random attacks is not enough either. It takes a thinking
        enemy pushing back, run after run, for the AI to learn protection that travels.
      ledger: experiments/gen25_dr_control.md
      items:
        - label: "The vanilla control, tight"
          quote: "Cost-trained generalists transfer at 2.354 +/- 0.014 (n=3, spread 0.014: essentially deterministic), WORSE than an untrained network (~1.99)."
        - label: "Exposure is not enough"
          quote: "BEST-RESPONSE pressure, not mere threat exposure, is causal for the adversarial arm's transfer."
        - label: "Zero-shot K/N rows (gen16)"
          ledger: experiments/gen16_multicity.md
          quote: "at an UNSEEN adversary budget (K=2) it tightens to 1.29x (beats random, 5/6 beat loss_det) and at an UNSEEN fleet size (N=5) it holds at 1.79x (beats random 2.10, 6/6 beat loss_det)"
  obj5:
    - title: "Not a lucky map, and not a lucky rule"
      plain: >-
        Across 160 crossings in four cities, habits are expensive on most of them, and
        our proving grounds were deliberately chosen among the hardest. The mission rule
        is not cherry-picked either: it is the one rule a predictable planner cannot
        escape by simply spreading its convoys out.
      ledger: experiments/a6_a7_a8_completions.md
      items:
        - label: "How often calibrated mixing matters"
          quote: "**69% of high-connectivity ODs have det/eq >= 2** (material calibration headroom); **93% have uniform-stack >= 1.5x eq** (naive randomisation clearly suboptimal almost everywhere)"
        - label: "The cherry-picking answer"
          quote: "the headline instances were screened to be favourable (top decile), from a population in which material headroom is the norm (69% at >= 2x), so the phenomenon is prevalent and the screen bought margin, not existence"
        - label: "B3: mission is not \"the objective where we win\""
          ledger: experiments/b3_b4_oracle.md
          quote: "the mission objective is not \"the objective where we win\": it is the unique member of the family in which the deterministic planner cannot escape by spreading, and the sweep maps exactly where that boundary sits (m relative to fleet-vs-disjoint-route capacity)"

objectives_verbatim:
  source: THESIS_STORYLINE.md
  note: "The five objectives as promised in the assessed literature review, quoted from THESIS_STORYLINE.md 'The promise'."
  aim: "develop and evaluate an adversarial, coevolutionary DRL framework (SACRED) generating robust, computationally efficient routing policies for the SDVRP"
  items:
    - id: obj1
      quote: "(1) formulate the SDVRP as an asymmetric zero-sum Markov game with discrete action spaces for a protagonist dispatcher and an environment-altering antagonist"
    - id: obj2
      quote: "(2) build a visual, interactive simulation environment"
    - id: obj3
      quote: "(3) develop SAC + ATLA, and investigate ERB bootstrapping via population-based metaheuristics"
    - id: obj4
      quote: "(4) incorporate SBO for facility location/fleet composition"
    - id: obj5
      quote: "(5) evaluate performance and resilience against SOTA adaptive metaheuristics **and a non-adversarially trained SAC baseline** under varied network disruption"
    - id: zst
      quote: "The review's identified gaps: SAC unexamined in SDVRP; asymmetric coevolutionary dynamic-alteration adversaries unstudied in last-mile settings; ZST as the crown jewel."
