headline_ladders:
  multiconvoy:
    title: "The multi-convoy headline ladder (35-159, N=3, K=1)"
    era: post-fix
    ledger: experiments/gen14_evidence.md
    unit: "mission-failure exploitability (lower is better)"
    rows:
      - arm: shortest_path
        label: "Shortest path (naive stack)"
        value: 0.912
        quote: "| shortest_path | 0.912 | naive stack |"
      - arm: alns_forced_stack
        label: "ALNS forced to stack (fairness)"
        value: 0.841
        quote: "| ALNS forced-to-STACK (fairness) | 0.841 | ALNS is free to stack but SPREADS by choice |"
      - arm: alns
        label: "ALNS (spreads, = loss_det)"
        value: 0.699
        quote: "| ALNS (spread, = loss_det) | 0.699 | the deterministic-class optimum |"
      - arm: vanilla
        label: "Vanilla SAC (non-adversarial, best-ckpt)"
        value: 0.526
        quote: "| vanilla (non-adversarial SAC, n=3) | best-ckpt **0.526** / final 0.628 +/- 0.006 | see note |"
      - arm: sacred
        label: "SACRED (adversarial, n=10)"
        value: 0.256
        quote: "| **SACRED (adversarial, n=10)** | **0.256 [0.246, 0.266]** | the headline |"
      - arm: equilibrium
        label: "Equilibrium (loss_mixed)"
        value: 0.206
        quote: "| equilibrium (loss_mixed) | 0.206 | computable bound |"
  singleconvoy:
    title: "The single-convoy headline ladder (33-71, TAP, pooled)"
    era: post-fix
    ledger: experiments/gen10_postfix.md
    unit: "interception exploitability (lower is better)"
    shared_quote: "Ladder (TAP, pooled): shortest 1.000 > vanilla 0.480 > uniform 0.455 > **sacred 0.276** >> equilibrium 0.167."
    rows:
      - arm: shortest_path
        label: "Shortest path"
        value: 1.000
      - arm: vanilla
        label: "Vanilla SAC (non-adversarial)"
        value: 0.480
      - arm: uniform
        label: "Uniform noise"
        value: 0.455
      - arm: sacred
        label: "SACRED (adversarial)"
        value: 0.276
      - arm: equilibrium
        label: "Equilibrium"
        value: 0.167

